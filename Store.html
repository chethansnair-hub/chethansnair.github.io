<head>
    <link rel="stylesheet" href="myWebsite.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>Java Store Simulator</title>
</head>
<body onload="typeWriter()">
    <h1 class="Title" id="A"></h1>
    
    <p class="w3-animate-opacity delay text">This was a project which I did to explore java and its functions. This was a project that
        I did alongside my Java tutor, my great-uncle who first digitilized the Kearala State Road Transportation Corporation(KSRTC) 
        </p>
    <div class="flex1">
        <img src="Shop.png" alt="The image shows a digital menu of a shop in Windows Command Prompt">
        <img src="Circ.png" alt="The Circuit and Code showed in the schematic" style="width: 750px; height: 500px;">
    </div>
    <div class="flex1">
        <video width="750px" height="500px" controls class="padding">
        <source src="Video.mp4" type="video/mp4">
        <source src="Video.ogg" type="video/ogg">
        Your browser does not support the video tag.
        </video>
    </div>

   
        
    
    
</body>
<script>
    var i = 0;
    var txt = 'Java Store Simulator'; /* The text */
    var speed = 70; /* The speed/duration of the effect in milliseconds */

    function typeWriter() {
    if (i < txt.length) {
        document.getElementById("A").innerHTML += txt.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
    }
</script>
