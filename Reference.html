<!DOCTYPE html>
<html>
    <head>
        <title>References</title>
        <link rel="stylesheet" href="myWebsite.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    </head>
    <body onload="typeWriter()">
        <h1 class="Title" id="demo"></h1>
        <p class="text w3-animate-opacity">No reviews as of right now. If you were satisfied with my work and would like to post a reference or a review please email me at chethansnair@gmail.com</p>
        
    </body>
    <script>
        var i = 0;
        var txt = 'References/Reviews';
        var speed = 70;
        function typeWriter() {
                if (i < txt.length) {
                    document.getElementById("demo").innerHTML += txt.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                }
                }
    </script>
</html>
